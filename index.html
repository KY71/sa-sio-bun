<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>さ小文</title>
<style>
  :root {
    --ink: #1a1a1a;
    --paper: #f4f1ea;
    --accent: #c0392b;
    --muted: #8a8378;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: "Hiragino Sans", "Yu Gothic", "Noto Sans TC", sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.2rem;
  }

  .wordmark {
    position: fixed;
    top: 1.4rem;
    left: 0; right: 0;
    text-align: center;
    font-size: 0.8rem;
    letter-spacing: 0.3em;
    color: var(--muted);
    opacity: 0.5;
    user-select: none;
  }

  .app { width: 100%; max-width: 600px; text-align: center; }

  /* 三段式切換 */
  .view { display: none; animation: fade 0.35s ease; }
  .app[data-state="input"]   .view-input   { display: block; }
  .app[data-state="loading"] .view-loading { display: block; }
  .app[data-state="result"]  .view-result  { display: block; }
  @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  /* ── 輸入畫面：大游標 + 淺色說明 ── */
  #input {
    width: 100%;
    border: none;
    background: transparent;
    text-align: center;
    font-family: inherit;
    font-size: clamp(1.6rem, 7vw, 2.6rem);
    line-height: 1.4;
    color: var(--ink);
    caret-color: var(--accent);
    outline: none;
  }
  #input::placeholder {
    color: var(--muted);
    opacity: 0.5;
    font-size: 0.95rem;
    letter-spacing: 0.04em;
  }

  .note { margin-top: 1rem; min-height: 1.2em; font-size: 0.8rem; color: var(--accent); }

  .primary-btn {
    margin-top: 1.8rem;
    padding: 0.7rem 2.4rem;
    font-size: 0.95rem;
    letter-spacing: 0.25em;
    color: #fff;
    background: var(--accent);
    border: none;
    border-radius: 999px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }
  .primary-btn:hover { opacity: 0.9; }
  .primary-btn:active { transform: scale(0.97); }

  /* ── Loading ── */
  .loader { display: flex; gap: 0.55rem; justify-content: center; }
  .loader span {
    width: 0.7rem; height: 0.7rem;
    border-radius: 50%;
    background: var(--accent);
    animation: bounce 1.2s infinite ease-in-out;
  }
  .loader span:nth-child(2) { animation-delay: 0.15s; }
  .loader span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.4); opacity: 0.35; }
    40% { transform: scale(1); opacity: 1; }
  }
  .loading-cap { margin-top: 1.2rem; font-size: 0.8rem; letter-spacing: 0.2em; color: var(--muted); }

  /* ── 結果：大字 + 兩個 icon ── */
  #out {
    font-size: clamp(2.2rem, 10vw, 4rem);
    font-weight: 600;
    line-height: 1.45;
    letter-spacing: 0.03em;
    word-break: break-word;
  }
  .actions { display: flex; gap: 2.2rem; justify-content: center; margin-top: 2.4rem; }
  .icon-btn {
    background: transparent;
    border: none;
    cursor: pointer;
    color: var(--muted);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.35rem;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    transition: color 0.2s;
  }
  .icon-btn:hover { color: var(--accent); }
  .icon-btn svg { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
</style>
</head>
<body>
<div class="wordmark">さ小文</div>

<main class="app" data-state="input">

  <!-- 輸入 -->
  <section class="view view-input">
    <input id="input" maxlength="16" autocomplete="off" autocapitalize="off"
           spellcheck="false" placeholder="打一句中文（16 字內）" />
    <p class="note" id="note"></p>
    <button class="primary-btn" id="go">翻 譯</button>
  </section>

  <!-- Loading -->
  <section class="view view-loading">
    <div class="loader"><span></span><span></span><span></span></div>
    <p class="loading-cap">変換中…</p>
  </section>

  <!-- 結果 -->
  <section class="view view-result">
    <div id="out"></div>
    <div class="actions">
      <button class="icon-btn" id="again">
        <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v4h4"/></svg>
        重來
      </button>
      <button class="icon-btn" id="copy">
        <svg viewBox="0 0 24 24"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg>
        <span id="copy-label">拷貝</span>
      </button>
    </div>
  </section>

</main>

<script>
// 轉換邏輯與 Gemini Key 都在後端 /api/convert，前端只送文字、畫結果。
const app = document.querySelector(".app");
const input = document.getElementById("input");
const note = document.getElementById("note");
const out = document.getElementById("out");
const copyLabel = document.getElementById("copy-label");

const THINK_BUDGET = 1024; // 固定「中」，不再提供選擇器

function setState(s) { app.dataset.state = s; }

async function convert() {
  const text = input.value.trim();
  note.textContent = "";
  if (!text) { note.textContent = "先打一句話再翻譯"; input.focus(); return; }

  setState("loading");

  try {
    const res = await fetch("/api/convert", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text, thinkBudget: THINK_BUDGET })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || ("錯誤 " + res.status));

    out.textContent = data.sasiobun || "—";
    setState("result");
  } catch (err) {
    console.error(err);
    note.textContent = "轉換失敗：" + err.message;
    setState("input");
    input.focus();
  }
}

function reset() {
  input.value = "";
  out.textContent = "";
  note.textContent = "";
  copyLabel.textContent = "拷貝";
  setState("input");
  input.focus();
}

document.getElementById("go").addEventListener("click", convert);
input.addEventListener("keydown", (e) => { if (e.key === "Enter") { e.preventDefault(); convert(); } });

document.getElementById("again").addEventListener("click", reset);
document.getElementById("copy").addEventListener("click", () => {
  navigator.clipboard.writeText(out.textContent).then(() => {
    copyLabel.textContent = "已拷貝";
    setTimeout(() => (copyLabel.textContent = "拷貝"), 1500);
  });
});

// 進站自動聚焦，顯示閃爍大游標
window.addEventListener("load", () => input.focus());
</script>
</body>
</html>
