<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>さ小文轉換器</title>
<style>
  :root {
    --ink: #1a1a1a;
    --paper: #f4f1ea;
    --accent: #c0392b;
    --muted: #8a8378;
    --line: #ddd6c8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Hiragino Sans", "Yu Gothic", "Noto Sans TC", sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
  }
  .wrap { width: 100%; max-width: 560px; }
  header { text-align: center; margin-bottom: 2rem; }
  h1 { font-size: 2rem; letter-spacing: 0.1em; margin-bottom: 0.4rem; }
  .sub { color: var(--muted); font-size: 0.85rem; letter-spacing: 0.05em; }

  textarea {
    width: 100%;
    min-height: 90px;
    padding: 1rem;
    font-size: 1rem;
    border: 1px solid var(--line);
    border-radius: 4px;
    background: #fffdf8;
    resize: vertical;
    font-family: inherit;
  }
  textarea:focus { outline: 2px solid var(--accent); border-color: transparent; }

  .keybox { margin-bottom: 1.5rem; }
  .keybox label {
    display: block;
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.05em;
    margin-bottom: 0.4rem;
  }
  .keybox input {
    width: 100%;
    padding: 0.7rem 1rem;
    font-size: 0.9rem;
    border: 1px solid var(--line);
    border-radius: 4px;
    background: #fffdf8;
    font-family: inherit;
  }
  .keybox input:focus { outline: 2px solid var(--accent); border-color: transparent; }
  .keyhint { font-size: 0.7rem; color: var(--muted); margin-top: 0.4rem; line-height: 1.4; }
  .keybox.saved { opacity: 0.55; }

  .thinkrow { display: flex; align-items: center; gap: 0.6rem; margin-top: 0.8rem; }
  .thinkrow label { font-size: 0.8rem; color: var(--muted); flex-shrink: 0; }
  .thinkrow select {
    flex: 1;
    padding: 0.5rem 0.7rem;
    font-size: 0.85rem;
    border: 1px solid var(--line);
    border-radius: 4px;
    background: #fffdf8;
    font-family: inherit;
    cursor: pointer;
  }

  button {
    width: 100%;
    margin-top: 1rem;
    padding: 0.9rem;
    font-size: 1rem;
    letter-spacing: 0.1em;
    color: #fff;
    background: var(--accent);
    border: none;
    border-radius: 4px;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  button:hover { opacity: 0.9; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }

  .result {
    margin-top: 2rem;
    border: 1px solid var(--line);
    border-radius: 4px;
    background: #fffdf8;
    overflow: hidden;
    display: none;
  }
  .result.show { display: block; }
  .row {
    padding: 0.9rem 1rem;
    border-bottom: 1px solid var(--line);
    display: flex;
    gap: 0.8rem;
    align-items: baseline;
  }
  .row:last-child { border-bottom: none; }
  .label {
    flex-shrink: 0;
    width: 3.2em;
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.05em;
  }
  .val { font-size: 1rem; line-height: 1.5; word-break: break-word; }
  .row.sasio .val { font-size: 1.4rem; font-weight: 600; letter-spacing: 0.05em; }

  .copy-btn {
    width: auto;
    margin: 0;
    padding: 0.3rem 0.8rem;
    font-size: 0.75rem;
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 3px;
    margin-left: auto;
  }

  .status { margin-top: 1rem; text-align: center; color: var(--muted); font-size: 0.85rem; min-height: 1.2em; }
  .error { color: var(--accent); }
  footer { margin-top: 3rem; color: var(--muted); font-size: 0.75rem; text-align: center; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>さ小文</h1>
    <p class="sub">日文皮・國語骨・台語魂</p>
  </header>

  <div class="keybox" id="keybox">
    <label for="apikey">Gemini API Key</label>
    <input type="password" id="apikey" placeholder="貼上你的 Key（只存在這個瀏覽器分頁）" autocomplete="off" />
    <p class="keyhint">Key 只保留在你目前的瀏覽器分頁，不會上傳、不會寫進檔案。關掉分頁就消失。</p>
  </div>

  <textarea id="input" placeholder="輸入中文或英文，例如：來都來了"></textarea>

  <div class="thinkrow">
    <label for="thinkbudget">思考程度</label>
    <select id="thinkbudget">
      <option value="0">關閉（最快，可能亂掰）</option>
      <option value="1024">中（先想一下）</option>
      <option value="4096" selected>高（想久一點，較準）</option>
      <option value="-1">自動（讓模型自己決定）</option>
    </select>
  </div>

  <button id="go">轉換</button>

  <div class="status" id="status"></div>

  <div class="result" id="result">
    <div class="row"><span class="label">原文</span><span class="val" id="r-原文"></span></div>
    <div class="row"><span class="label">台語</span><span class="val" id="r-台語"></span></div>
    <div class="row"><span class="label">台羅</span><span class="val" id="r-台羅"></span></div>
    <div class="row sasio">
      <span class="label">さ小文</span>
      <span class="val" id="r-さ小文"></span>
      <button class="copy-btn" id="copy">複製</button>
    </div>
  </div>

  <footer>把你的台味，包裝成一眼像日文的迷因</footer>
</div>

<script>
// ====== 設定 ======
// API Key 由使用者在網頁上輸入，不寫死在檔案裡。
const MODEL = "gemini-2.5-flash-lite";
function getEndpoint(key) {
  return `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${key}`;
}

// ====== System Prompt ======
const SYSTEM_PROMPT = `你是一個台語翻譯與さ小文轉換專家。

さ小文是一種台灣網路迷因文體，外觀看起來像日文，但實際上是用平假名拼出台語發音，並混入少量漢字。目標是讓人一眼以為是日文，唸出來卻是純台語。

## 轉換流程（每一步都要做完才能進下一步，不可跳步）

### 第一步：中文／英文 → 台語
- 翻譯成自然口語台語，逐字確認沒有漏字
- 特別注意時間詞：「今天」是「今仔日」(kin-á-ji̍t)，三個音節都要在，不可簡寫成「今仔」

### 第二步：台語 → 台羅拼音
- 依教育部台羅方案標音
- 把每個字的音節用「-」清楚分開，例如：今仔日 = kin-á-ji̍t

### 第三步：台羅 → 假名（最關鍵，lite 最容易在這裡出錯）
**逐音節對應，一個台羅音節 = 一個假名，不可合併、不可遺漏、不可張冠李戴。**

操作方法：先把整句台羅拆成一串獨立音節，再一個一個查表轉假名。

常見台羅音節 → 平假名對照（務必嚴格區分相近音）：
- lí → り
- kin → きん（注意！是 ki 的音，不是 ku）
- khùn → くん（這才是 ku 的音，睏）
- á → あ
- ji̍t → じ
- pá → ぱ
- bōe / bē → べ
- guá → わ
- thiann → てぃあん
- teh → てー
- khàu → 靠（借音漢字）

⚠️ 最容易錯的陷阱：kin（今，きん）和 khùn（睏，くん）發音相近但不同，絕對不可混淆。轉換時請對照原台羅，確認每個音節都對到正確假名。

## さ小文四大規則
規則一【漢字上限】：短句最多只能出現兩個漢字（專有名詞、流行語除外）
規則二【漢字選擇】：必須以台羅發音為準去找對應借音漢字。優先順序：(1)有台味感的借音漢字如「靠」「死」「愛」「叨」(2)中日共用常用漢字如天、雨、心、人、食、今、来(3)台語原字。不可直接留原中文字（除非發音恰好吻合台羅）。
規則三【假名優先】：其餘音節一律用平假名，盡量避免片假名。
規則四【專有名詞保留】：流行語、新造詞、專有名詞直接保留原字不轉假名，不計入漢字上限。如「班味」「暈碳」「瑪卡巴卡」。
規則五【嚴禁羅馬字】：sasiobun 欄位裡絕對不可出現任何羅馬拼音字母（a-z、聲調符號）。台羅拼音只是中間步驟，最終 sasiobun 只能由「平假名 + 少量漢字」組成。例如台羅的 pá 必須寫成平假名 ぱ，不可直接留 pá。

## 完整示範（照這個流程做）
輸入：你今天睡飽了沒有？
第一步台語：你今仔日睏飽未？
第二步台羅：lí kin-á-ji̍t khùn-pá bē？
第三步逐音節拆解：lí=り / kin=きん / á=あ / ji̍t=じ / khùn=くん / pá=ぱ / bē=べ
合併 sasiobun：り きん あ じ くん ぱ べ？

## 自我檢查（輸出前必做，逐項確認）
1. sasiobun 裡有沒有殘留英文字母（a-z）？有 → 全部改成平假名
2. 台羅有幾個音節，sasiobun 就該有相對應的假名/漢字數，數量有沒有對上？少了就是漏字
3. kin/khùn 這類相近音有沒有對到正確假名？

## 參考案例
- 來都來了 → 来と来あ
- 我今天暈碳了 → わ 今あじ 暈碳き あ
- 你在哪裡？ → り てぃ 叨 い？
- 我聽你在哭 → わ てぃあん り てー 靠
- 你睡了嗎？ → り くん 去 べ？

## 輸出格式
只輸出一個 JSON 物件，格式：
{"taigi":"台語句子","tailo":"台羅拼音","sasiobun":"さ小文"}

重要：直接回傳純 JSON 字串，開頭第一個字必須是 {，結尾最後一個字必須是 }。不要加任何說明文字，絕對不要使用 markdown 的 \`\`\` 標籤。`;

// ====== 主邏輯 ======
const input = document.getElementById("input");
const goBtn = document.getElementById("go");
const statusEl = document.getElementById("status");
const resultEl = document.getElementById("result");
const copyBtn = document.getElementById("copy");
const keyInput = document.getElementById("apikey");
const keybox = document.getElementById("keybox");

async function convert() {
  const text = input.value.trim();
  const key = keyInput.value.trim();
  if (!key) { setStatus("請先在上方貼上你的 Gemini API Key", true); keyInput.focus(); return; }
  if (!text) { setStatus("請先輸入文字", true); return; }

  goBtn.disabled = true;
  resultEl.classList.remove("show");

  // 思考預算：0=關閉，數字越大想越久（但越慢、越耗額度）。-1 為動態自動。
  const thinkBudget = parseInt(document.getElementById("thinkbudget").value, 10);

  const body = JSON.stringify({
    systemInstruction: { parts: [{ text: SYSTEM_PROMPT }] },
    contents: [{ role: "user", parts: [{ text: text }] }],
    generationConfig: {
      temperature: 0.7,
      responseMimeType: "application/json",
      thinkingConfig: { thinkingBudget: thinkBudget }
    }
  });

  // 自動退避重試：遇到 429（額度）或 503/500/502（伺服器忙線）時等待後重試
  const delays = [1000, 2000, 4000, 8000];
  let attempt = 0;

  while (true) {
    try {
      setStatus(attempt === 0 ? "轉換中…" : `伺服器忙線中，重試第 ${attempt} 次…`);
      const res = await fetch(getEndpoint(key), {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body
      });

      // 429=額度、500/502/503=伺服器端暫時問題，都自動退避重試
      if (res.status === 429 || res.status === 500 || res.status === 502 || res.status === 503) {
        if (attempt < delays.length) {
          await new Promise(r => setTimeout(r, delays[attempt]));
          attempt++;
          continue;
        }
        if (res.status === 429) {
          throw new Error("已達免費額度上限（429）。請稍後再試，或考慮換 Groq／開啟付費方案。");
        }
        throw new Error("Google 伺服器忙線中（" + res.status + "），重試多次仍失敗，請稍後再試一次。");
      }

      if (!res.ok) {
        if (res.status === 400 || res.status === 403) throw new Error("Key 無效或權限不足（" + res.status + "）");
        throw new Error("API 回應錯誤 " + res.status);
      }

      const data = await res.json();
      const raw = data?.candidates?.[0]?.content?.parts?.[0]?.text || "";
      console.log("Gemini 原始回應：", raw);

      // 強壯解析：先去掉 markdown 標記，再抓出第一個完整的 {...} 物件
      let cleaned = raw.replace(/```json|```/g, "").trim();
      const start = cleaned.indexOf("{");
      const end = cleaned.lastIndexOf("}");
      if (start === -1 || end === -1 || end < start) {
        throw new Error("回應裡找不到 JSON，請再試一次（內容已印在 console）");
      }
      cleaned = cleaned.slice(start, end + 1);
      const parsed = JSON.parse(cleaned);

      document.getElementById("r-原文").textContent = text;
      document.getElementById("r-台語").textContent = parsed.taigi || "—";
      document.getElementById("r-台羅").textContent = parsed.tailo || "—";
      document.getElementById("r-さ小文").textContent = parsed.sasiobun || "—";
      resultEl.classList.add("show");
      keybox.classList.add("saved");
      setStatus("");
      break;
    } catch (err) {
      console.error(err);
      setStatus("轉換失敗：" + err.message, true);
      break;
    }
  }
  goBtn.disabled = false;
}

function setStatus(msg, isError) {
  statusEl.textContent = msg;
  statusEl.classList.toggle("error", !!isError);
}

goBtn.addEventListener("click", convert);
input.addEventListener("keydown", (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === "Enter") convert();
});
copyBtn.addEventListener("click", () => {
  const t = document.getElementById("r-さ小文").textContent;
  navigator.clipboard.writeText(t).then(() => {
    copyBtn.textContent = "已複製";
    setTimeout(() => (copyBtn.textContent = "複製"), 1500);
  });
});
</script>
</body>
</html>
