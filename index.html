<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>さ小文轉換器</title>
<style>
  :root {
    --ink: #1a1a1a;
    --paper: #f4f1ea;
    --accent: #c0392b;
    --muted: #8a8378;
    --line: #ddd6c8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Hiragino Sans", "Yu Gothic", "Noto Sans TC", sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
  }
  .wrap { width: 100%; max-width: 560px; }
  header { text-align: center; margin-bottom: 2rem; }
  h1 { font-size: 2rem; letter-spacing: 0.1em; margin-bottom: 0.4rem; }
  .sub { color: var(--muted); font-size: 0.85rem; letter-spacing: 0.05em; }

  textarea {
    width: 100%;
    min-height: 90px;
    padding: 1rem;
    font-size: 1rem;
    border: 1px solid var(--line);
    border-radius: 4px;
    background: #fffdf8;
    resize: vertical;
    font-family: inherit;
  }
  textarea:focus { outline: 2px solid var(--accent); border-color: transparent; }

  .keybox { margin-bottom: 1.5rem; }
  .keybox label {
    display: block;
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.05em;
    margin-bottom: 0.4rem;
  }
  .keybox input {
    width: 100%;
    padding: 0.7rem 1rem;
    font-size: 0.9rem;
    border: 1px solid var(--line);
    border-radius: 4px;
    background: #fffdf8;
    font-family: inherit;
  }
  .keybox input:focus { outline: 2px solid var(--accent); border-color: transparent; }
  .keyhint { font-size: 0.7rem; color: var(--muted); margin-top: 0.4rem; line-height: 1.4; }
  .keybox.saved { opacity: 0.55; }

  .thinkrow { display: flex; align-items: center; gap: 0.6rem; margin-top: 0.8rem; }
  .thinkrow label { font-size: 0.8rem; color: var(--muted); flex-shrink: 0; }
  .thinkrow select {
    flex: 1;
    padding: 0.5rem 0.7rem;
    font-size: 0.85rem;
    border: 1px solid var(--line);
    border-radius: 4px;
    background: #fffdf8;
    font-family: inherit;
    cursor: pointer;
  }

  button {
    width: 100%;
    margin-top: 1rem;
    padding: 0.9rem;
    font-size: 1rem;
    letter-spacing: 0.1em;
    color: #fff;
    background: var(--accent);
    border: none;
    border-radius: 4px;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  button:hover { opacity: 0.9; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }

  .result {
    margin-top: 2rem;
    border: 1px solid var(--line);
    border-radius: 4px;
    background: #fffdf8;
    overflow: hidden;
    display: none;
  }
  .result.show { display: block; }
  .row {
    padding: 0.9rem 1rem;
    border-bottom: 1px solid var(--line);
    display: flex;
    gap: 0.8rem;
    align-items: baseline;
  }
  .row:last-child { border-bottom: none; }
  .label {
    flex-shrink: 0;
    width: 3.2em;
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.05em;
  }
  .val { font-size: 1rem; line-height: 1.5; word-break: break-word; }
  .row.sasio .val { font-size: 1.4rem; font-weight: 600; letter-spacing: 0.05em; }

  .copy-btn {
    width: auto;
    margin: 0;
    padding: 0.3rem 0.8rem;
    font-size: 0.75rem;
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 3px;
    margin-left: auto;
  }

  .status { margin-top: 1rem; text-align: center; color: var(--muted); font-size: 0.85rem; min-height: 1.2em; }
  .error { color: var(--accent); }
  footer { margin-top: 3rem; color: var(--muted); font-size: 0.75rem; text-align: center; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>さ小文</h1>
    <p class="sub">日文皮・國語骨・台語魂</p>
  </header>

  <textarea id="input" placeholder="輸入中文或英文，例如：來都來了"></textarea>

  <div class="thinkrow">
    <label for="thinkbudget">思考程度</label>
    <select id="thinkbudget">
      <option value="0">關閉（最快，可能亂掰）</option>
      <option value="1024">中（先想一下）</option>
      <option value="4096" selected>高（想久一點，較準）</option>
      <option value="-1">自動（讓模型自己決定）</option>
    </select>
  </div>

  <button id="go">轉換</button>

  <div class="status" id="status"></div>

  <div class="result" id="result">
    <div class="row"><span class="label">原文</span><span class="val" id="r-原文"></span></div>
    <div class="row"><span class="label">台語</span><span class="val" id="r-台語"></span></div>
    <div class="row"><span class="label">台羅</span><span class="val" id="r-台羅"></span></div>
    <div class="row sasio">
      <span class="label">さ小文</span>
      <span class="val" id="r-さ小文"></span>
      <button class="copy-btn" id="copy">複製</button>
    </div>
  </div>

  <footer>把你的台味，包裝成一眼像日文的迷因</footer>
</div>

<script>
// ====== 主邏輯 ======
// 轉換邏輯與 Gemini Key 都在後端 /api/convert（見 api/convert.js），
// 前端只負責把文字送過去、把結果畫出來。Key 不會出現在這裡。
const input = document.getElementById("input");
const goBtn = document.getElementById("go");
const statusEl = document.getElementById("status");
const resultEl = document.getElementById("result");
const copyBtn = document.getElementById("copy");

async function convert() {
  const text = input.value.trim();
  if (!text) { setStatus("請先輸入文字", true); return; }

  goBtn.disabled = true;
  resultEl.classList.remove("show");
  setStatus("轉換中…");

  // 思考預算：0=關閉，數字越大想越久（但越慢、越耗額度）。-1 為動態自動。
  const thinkBudget = parseInt(document.getElementById("thinkbudget").value, 10);

  try {
    const res = await fetch("/api/convert", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text, thinkBudget })
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.error || ("錯誤 " + res.status));

    document.getElementById("r-原文").textContent = text;
    document.getElementById("r-台語").textContent = data.taigi || "—";
    document.getElementById("r-台羅").textContent = data.tailo || "—";
    document.getElementById("r-さ小文").textContent = data.sasiobun || "—";
    resultEl.classList.add("show");
    setStatus("");
  } catch (err) {
    console.error(err);
    setStatus("轉換失敗：" + err.message, true);
  }
  goBtn.disabled = false;
}

function setStatus(msg, isError) {
  statusEl.textContent = msg;
  statusEl.classList.toggle("error", !!isError);
}

goBtn.addEventListener("click", convert);
input.addEventListener("keydown", (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === "Enter") convert();
});
copyBtn.addEventListener("click", () => {
  const t = document.getElementById("r-さ小文").textContent;
  navigator.clipboard.writeText(t).then(() => {
    copyBtn.textContent = "已複製";
    setTimeout(() => (copyBtn.textContent = "複製"), 1500);
  });
});
</script>
</body>
</html>
