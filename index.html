<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>さ小文</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@800&family=Zen+Kaku+Gothic+New:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink: #141414;
    --paper: #fafafa;
    --muted: #9a9a9a;
    --error: #c0392b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: "Zen Kaku Gothic New", "Noto Sans TC", "PingFang TC", system-ui, sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.2rem;
  }

  .wordmark {
    position: fixed;
    top: 1.4rem; left: 0; right: 0;
    text-align: center;
    font-family: "Shippori Mincho B1", serif;
    font-size: 0.95rem;
    letter-spacing: 0.35em;
    color: var(--muted);
    opacity: 0.6;
    user-select: none;
  }

  .app { width: 100%; max-width: 640px; text-align: center; }

  .view { display: none; animation: fade 0.35s ease; }
  .app[data-state="input"]   .view-input   { display: block; }
  .app[data-state="loading"] .view-loading { display: block; }
  .app[data-state="result"]  .view-result  { display: block; }
  @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  /* 輸入畫面：大游標 + 淺色說明 */
  #input {
    width: 100%;
    border: none;
    background: transparent;
    text-align: center;
    font-family: inherit;
    font-weight: 500;
    font-size: clamp(1.6rem, 7vw, 2.6rem);
    line-height: 1.4;
    color: var(--ink);
    caret-color: var(--ink);
    outline: none;
  }
  #input::placeholder {
    color: var(--muted);
    opacity: 0.7;
    font-weight: 400;
    font-size: 0.95rem;
    letter-spacing: 0.04em;
  }

  .note { margin-top: 1rem; min-height: 1.2em; font-size: 0.8rem; color: var(--error); }

  .primary-btn {
    margin-top: 1.8rem;
    padding: 0.7rem 2.4rem;
    font-size: 0.95rem;
    letter-spacing: 0.25em;
    color: var(--paper);
    background: var(--ink);
    border: none;
    border-radius: 999px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }
  .primary-btn:hover { opacity: 0.85; }
  .primary-btn:active { transform: scale(0.97); }

  /* Loading */
  .loader { display: flex; gap: 0.55rem; justify-content: center; }
  .loader span {
    width: 0.7rem; height: 0.7rem; border-radius: 50%;
    background: var(--ink);
    animation: bounce 1.2s infinite ease-in-out;
  }
  .loader span:nth-child(2) { animation-delay: 0.15s; }
  .loader span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.4); opacity: 0.3; }
    40% { transform: scale(1); opacity: 1; }
  }
  .loading-cap { margin-top: 1.2rem; font-size: 0.8rem; letter-spacing: 0.2em; color: var(--muted); }

  /* 結果：明朝體大字 + 兩個 icon */
  #out {
    font-family: "Shippori Mincho B1", "Noto Serif TC", "Songti TC", serif;
    font-weight: 800;
    line-height: 1.25;
    letter-spacing: 0.02em;
    word-break: break-word;
    font-size: 96px; /* JS 會依寬度動態調整 */
  }
  .actions { display: flex; gap: 2.4rem; justify-content: center; margin-top: 2.6rem; }
  .icon-btn {
    background: transparent; border: none; cursor: pointer;
    color: var(--muted);
    display: flex; flex-direction: column; align-items: center; gap: 0.35rem;
    font-size: 0.7rem; letter-spacing: 0.1em;
    transition: color 0.2s;
  }
  .icon-btn:hover { color: var(--ink); }
  .icon-btn svg { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
</style>
</head>
<body>
<div class="wordmark">さ小文</div>

<main class="app" data-state="input">

  <section class="view view-input">
    <input id="input" maxlength="16" autocomplete="off" autocapitalize="off"
           spellcheck="false" placeholder="打一句中文（16 字內）" />
    <p class="note" id="note"></p>
    <button class="primary-btn" id="go">翻 譯</button>
  </section>

  <section class="view view-loading">
    <div class="loader"><span></span><span></span><span></span></div>
    <p class="loading-cap">変換中…</p>
  </section>

  <section class="view view-result">
    <div id="out"></div>
    <div class="actions">
      <button class="icon-btn" id="again">
        <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v4h4"/></svg>
        重來
      </button>
      <button class="icon-btn" id="copy">
        <svg viewBox="0 0 24 24"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg>
        <span id="copy-label">拷貝</span>
      </button>
    </div>
  </section>

</main>

<script>
const app = document.querySelector(".app");
const input = document.getElementById("input");
const note = document.getElementById("note");
const out = document.getElementById("out");
const copyLabel = document.getElementById("copy-label");

const THINK_BUDGET = 1024; // 固定「中」

function setState(s) { app.dataset.state = s; }

// 在可用寬度內把大字盡量放大，能一行就一行；真的太長才縮到下限後換行
function fitText() {
  const MAX = 150, MIN = 34;
  const avail = out.parentElement.clientWidth;
  out.style.whiteSpace = "nowrap";
  let size = MAX;
  out.style.fontSize = size + "px";
  while (size > MIN && out.scrollWidth > avail) {
    size -= 2;
    out.style.fontSize = size + "px";
  }
  if (out.scrollWidth > avail) out.style.whiteSpace = "normal"; // 縮到下限仍超寬 → 允許換行
}

async function convert() {
  const text = input.value.trim();
  note.textContent = "";
  if (!text) { note.textContent = "先打一句話再翻譯"; input.focus(); return; }

  setState("loading");

  try {
    const res = await fetch("/api/convert", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text, thinkBudget: THINK_BUDGET })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || ("錯誤 " + res.status));

    out.textContent = data.sasiobun || "—";
    setState("result");
    fitText();
    if (document.fonts && document.fonts.ready) document.fonts.ready.then(fitText); // 字體載入後再校正
  } catch (err) {
    console.error(err);
    note.textContent = "轉換失敗：" + err.message;
    setState("input");
    input.focus();
  }
}

function reset() {
  input.value = "";
  out.textContent = "";
  note.textContent = "";
  copyLabel.textContent = "拷貝";
  setState("input");
  input.focus();
}

document.getElementById("go").addEventListener("click", convert);
input.addEventListener("keydown", (e) => { if (e.key === "Enter") { e.preventDefault(); convert(); } });
document.getElementById("again").addEventListener("click", reset);
document.getElementById("copy").addEventListener("click", () => {
  navigator.clipboard.writeText(out.textContent).then(() => {
    copyLabel.textContent = "已拷貝";
    setTimeout(() => (copyLabel.textContent = "拷貝"), 1500);
  });
});

window.addEventListener("load", () => input.focus());
window.addEventListener("resize", () => { if (app.dataset.state === "result") fitText(); });
</script>
</body>
</html>
